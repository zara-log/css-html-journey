<html>
  <head>
    <title>Login Page</title>
    <link rel="stylesheet" href="login.css" />
    <link rel="stylesheet" href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css">
  </head>

  <body>
    
    <div class="main-card">
      <h1>Login</h1>

      <form >

       <div class="input-grp">
        <input type="text" class="field-box" placeholder="Username" required>
        <i class="bx bxs-user" style="color: black;"></i>
      </div>

      <div class="input-grp">   
        <input type="password" class="field-box" placeholder="Password" required>
        <i class="bx bxs-lock" style="color: black;"></i>
      </div>  

        <div class="row-links">
            <label><input type="checkbox">Remember me</label>
            <a href="#">Forgot password?</a>
        </div>

        <button type="submit" class="submit-btn">Login</button>

        <p class="footer">
          Don't have an account? <a href="#">Register</a>
        </p>

      </form>

    </div>
  </body>
</html>
